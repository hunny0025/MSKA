<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maruti Suzuki Customer Care</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-container">

    <div class="chat-header">
      <div class="logo-circle">M</div>
      <div class="header-text">
        <h1>Maruti Suzuki</h1>
        <p>Customer Care Assistant</p>
      </div>
    </div>

    <div id="chat-window" class="chat-window">
      <div class="message bot">
        Hello! I'm your Maruti Suzuki assistant. Ask me about service bookings, warranty, roadside assistance, and more.
      </div>
    </div>

    <div id="suggestions" class="suggestions"></div>

    <form id="chat-form" class="chat-input-row">
      <input type="text" id="user-input" placeholder="Type your question..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>

  </div>

<script src="script.js"></script>
</body>
</html>
