# =============================================================================
# Maruti Suzuki Knowledge Assistant — Docker Compose (Local Development)
# =============================================================================
# Usage: docker compose up --build
# Serves: FastAPI on :8000, PostgreSQL on :5432, Frontend on :3000

services:
  # --- FastAPI Backend ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mskai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - mskai-storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mskai-network

  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: mskai-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mskai}
      POSTGRES_USER: ${POSTGRES_USER:-mskai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
    volumes:
      - mskai-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mskai_user} -d ${POSTGRES_DB:-mskai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mskai-network

  # --- Frontend (static file server for local dev) ---
  frontend:
    image: nginx:alpine
    container_name: mskai-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mskai-network

volumes:
  mskai-pgdata:
    driver: local
  mskai-storage:
    driver: local

networks:
  mskai-network:
    driver: bridge
